spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/retirement_db}
    username: ${SPRING_DATASOURCE_USERNAME:retirement_user}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:default-dev-secret-replace-in-production-must-be-at-least-256-bits-long!!}
  expiration-ms: 3600000
  refresh-expiration-ms: 86400000

server:
  port: 8080
